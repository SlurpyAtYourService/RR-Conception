<!DOCTYPE html>
<html>
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />	
	<title>about me</title>

	<link rel="stylesheet" href="./style.css" type="text/css" media="all" />

	<style>
		/* RESET OVERFLOW BUGS */
		html, body {
			margin: 0;
			padding: 0;
			height: 100%;
			scroll-behavior: smooth;
			overflow-x: hidden;
		}

		/* VIDEO BACKGROUND FIX */
		.home-bg video {
			position: fixed;
			inset: 0;
			width: 100%;
			height: 100%;
			object-fit: cover;
			z-index: -2;
		}

		/* SOFTER TEXT GLOW (WIDER RANGE, LESS INTENSE) */
		h1, h2, p, li, a, .scroll-tip {
			color: #fff;
			text-shadow:
				0 0 3px rgba(0,0,0,0.6),
				0 0 8px rgba(0,0,0,0.5),
				0 0 14px rgba(0,0,0,0.35);
		}

		/* VIGNETTE (LIGHTER THAN BEFORE) */
		body::before {
			content: "";
			position: fixed;
			inset: 0;
			pointer-events: none;
			z-index: -1;
			background: radial-gradient(
				circle at center,
				rgba(0,0,0,0) 55%,
				rgba(0,0,0,0.45) 100%
			);
		}

		/* FIX SECTION LAYOUT (IMPORTANT FOR SCROLL BUG) */
		.section-wrap {
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			position: relative;
		}

		.section {
			width: 100%;
			max-width: 1100px;
			text-align: center;
		}

		.section-content {
			text-align: center;
		}

		/* FIX NAV OFFSET ISSUE */
		.section-header {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			z-index: 10;
		}

		/* PREVENT VISUAL OVERLAP BETWEEN SECTIONS */
		.section-wrap + .section-wrap {
			margin-top: 0;
		}
	</style>
</head>

<body class="loading-process">

<div class="home-bg">
    <video autoplay muted loop playsinline>
        <source src="background.mp4" type="video/mp4">
    </video>
</div>

<div class="section-header">
	<div class="section">
		<nav class="nav">
			<ul>
				<li><a href="#about">about me</a></li>
				<li><a href="#works">my work</a></li>
				<li><a href="#contact">contact me</a></li>
			</ul>
		</nav>
	</div>
</div>

<div class="section-wrap section-fristpage">
	<div class="section">
		<p>Hi, im Rami Banbouk</p>
		<p>i do designing</p>
	</div>
</div>

<div id="about" class="section-wrap section-about">
	<div class="section">
		<h1>About Me</h1>
		<p>i do designing</p>
		<p>i do designing</p>
	</div>
</div>

<div id="works" class="section-wrap section-works">
	<div class="section">
		<h1>My Work</h1>
	</div>
</div>

<div id="contact" class="section-wrap section-contact">
	<div class="section">
		<h1>Contact Me</h1>
		<p>@rt_graphic</p>
	</div>
</div>

<script src="js/global.js"></script>

</body>
</html>
